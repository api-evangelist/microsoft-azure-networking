- name: Azure NAT Gateway API
  description: >-
    Simplify outbound-only internet connectivity for virtual networks. When
    configured on a subnet, all outbound connectivity uses specified static
    public IP addresses. NAT Gateway provides on-demand SNAT port allocation
    without the need for a load balancer or directly attached public IPs.
  image: https://azure.microsoft.com/svghandler/azure-networking.svg
  humanURL: https://learn.microsoft.com/en-us/azure/nat-gateway/
  baseURL: https://management.azure.com/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/natGateways
  tags:
  - NAT Gateway
  - Outbound Connectivity
  - SNAT
  - IP Address Management
